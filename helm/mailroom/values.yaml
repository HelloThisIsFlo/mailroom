# -- Image configuration
image:
  repository: ghcr.io/hellothisisflo/mailroom
  tag: latest
  pullPolicy: Always

# -- Number of replicas (single-instance service)
replicaCount: 1

# -- Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# -- Setup Job configuration
setup:
  # -- Run setup in apply mode (provisions missing resources on Fastmail)
  apply: false

# -- Application configuration (becomes config.yaml in ConfigMap)
config:
  polling:
    interval: 60
    debounce_seconds: 1  # enough to coalesce multi-event SSE bursts
  triage:
    screener_mailbox: Screener
    categories:
      - name: Imbox
        add_to_inbox: true
      - name: Person
        parent: Imbox
        add_to_inbox: true
        contact_type: person
      - Feed
      - Paper Trail
      - name: Truck
        parent: Paper Trail
      - name: Bank
        parent: Paper Trail
      - name: Billboard
        parent: Paper Trail
      - Jail
  mailroom:
    label_error: "@MailroomError"
    label_warning: "@MailroomWarning"
    warnings_enabled: true
    provenance_group: "Mailroom"
  logging:
    level: info

# -- Secrets: provide via -f secrets-values.yaml
# See secrets-values.yaml.example for required keys
secrets: {}
